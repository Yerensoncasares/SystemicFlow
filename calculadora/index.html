<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Científica Pro</title>
  <link href="css/index.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
</head>
<body>

<div class="calculator-case">
 <div class="label">Calculadora Sexy 2.0</div>
 <div class="screen-container">
  <input type="text" id="display" readonly placeholder="0"></div>

 <div class="keypad">
  <button class="btn-clear" onclick="clearScreen()">AC</button><button class="btn-func" onclick="borrar()">→</button>
  <button class="btn-func" onclick="insert('sin(')">sin</button>
  <button class="btn-func" onclick="insert('cos(')">cos</button>
  <button class="btn-func" onclick="insert('tan(')">tan</button>
  <button class="btn-func" onclick="insert('log(')">log</button>
  <button class="btn-func" onclick="insert('^')">xʸ</button>
  <button class="btn-func" onclick="insert('sqrt(')">√</button>
  <button class="btn-func" onclick="insert('/')">÷</button>
  <button class="btn-number" onclick="insert('7')">7</button>
  <button class="btn-number" onclick="insert('8')">8</button>
  <button class="btn-number" onclick="insert('9')">9</button>
  <button class="btn-func" onclick="insert('*')">×</button>
  <button class="btn-number" onclick="insert('4')">4</button>
  <button class="btn-number" onclick="insert('5')">5</button>
  <button class="btn-number" onclick="insert('6')">6</button>
  <button class="btn-func" onclick="insert('-')">-</button>
  <button class="btn-number" onclick="insert('1')">1</button>
  <button class="btn-number" onclick="insert('2')">2</button>
  <button class="btn-number" onclick="insert('3')">3</button>
  <button class="btn-func" onclick="insert('+')">+</button><button class="btn-number0" onclick="insert('0')">0</button>
  <button class="btn-func" onclick="insert('.')">,</button>
  <button class="btn-func" onclick="insert('(')">(</button>
  <button class="btn-func" onclick="insert(')')">)</button>
  <button class="btn-equal" onclick="calculate()">=</button>
 </div>
</div>
<script src="js/index.js"></script>
</body>
</html>
